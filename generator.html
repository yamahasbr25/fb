        <div class="note">Akan digunakan sebagai URL dan dasar pencarian Related Posts.</div>

            Preview URL: <br>

        </div>
    </div>

    </div>

        <div class="note">Penting: Iklan Ad2 otomatis diselipkan di bawah paragraf pertama!</div>

<script>
let baseDomain = "https://yourviralwebsite.com/"; 

// Fetch domain from domain.txt if exists
fetch('domain.txt')
    .then(response => response.text())
    .then(data => {
        let domain = data.trim();
        if (domain) {
            domain = domain.replace(/\[.*?\]\s*/g, '').replace(/\s*/gi, '').trim(); 
            if (!domain.startsWith('http://') && !domain.startsWith('https://')) {
                domain = 'https://' + domain;
            }
            if (!domain.endsWith('/')) {
                domain += '/';
            }
            baseDomain = domain;
        }
    })
    .catch(err => console.log('File domain.txt tidak ditemukan, menggunakan domain default.'));

const keywordInput = document.getElementById('keyword');
const recBox = document.getElementById('rec-box');
const recLink = document.getElementById('rec-link');

// Update preview URL based on Keyword
keywordInput.addEventListener('input', function() {
    const keywordText = this.value.trim();
    if (keywordText.length > 0) {
        const slug = keywordText.toLowerCase()
                                .replace(/\s+/g, '-')
                                .replace(/[^a-z0-9-]/g, '')
                                .replace(/-+/g, '-');
        const fullUrl = baseDomain + slug;
        recLink.href = fullUrl;
        recLink.textContent = fullUrl;
        recBox.style.display = 'block';
    } else {
        recBox.style.display = 'none';
    }
});

function generateAndDownload() {
    const keywordInputVal = document.getElementById('keyword').value.trim();
    const imageUrlVal = document.getElementById('image-url').value.trim();
    const contentInput = document.getElementById('content').value.trim();
    
    if (!keywordInputVal || !contentInput || !imageUrlVal) {
        alert('Mohon isi semua kolom: Keyword, URL Gambar, dan Isi Artikel!');
        return;
    }
    
    const keywordSlug = keywordInputVal.toLowerCase()
                                    .replace(/\s+/g, '-')
                                    .replace(/[^a-z0-9-]/g, '')
                                    .replace(/-+/g, '-');
    const fileName = keywordSlug + '.html';
    const targetFullUrl = baseDomain + keywordSlug;
    
    const lines = contentInput.split('\n').map(line => line.trim()).filter(line => line.length > 0);
    
    if (lines.length < 2) {
        alert('Isi artikel minimal harus ada Judul (H1) dan 1 Paragraf!');
        return;
    }
    
    const h1Title = lines[0]; 
    const remainingParagraphs = lines.slice(1);
    
    let articleBodyHtml = '';
    
    // Menyusun paragraf dan menyelipkan Ad2 di bawah paragraf pertama
    remainingParagraphs.forEach((paragraphText, index) => {
        articleBodyHtml += `<p>${paragraphText}</p>\n`;
        // Selipkan ad2.js di bawah paragraf index ke-0 (paragraf pertama)
        if (index === 0) {
            articleBodyHtml += `        <center style="margin: 20px 0;"><script src="https://seribudollarperhari.github.io/banner/ad2.js"><\/script></center>\n        `;
        }
    });
    
    const metaDesc = remainingParagraphs[0] ? remainingParagraphs[0].substring(0, 150) + '...' : h1Title;
    
    // TEMPLATE FINAL HTML
    const finalHtmlOutput = `<!DOCTYPE html>

        @media (max-width: 480px) {

            .content-card img { height: 100px; }
            .content-card-body h3 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    
    <center><script src="https://seribudollarperhari.github.io/banner/ad1.js"><\/script></center>

    <main class="article-container">
        
        <h1>${h1Title}</h1>
        
        <img class="hero-image" src="${imageUrlVal}" alt="${h1Title}">
        
        <article>

        </article>

        <section class="share-section">
            <div class="share-buttons-grid">
                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(targetFullUrl)}" target="_blank" class="btn-share btn-fb" title="Share on Facebook">

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInAppBrowser = /FBAN|FBAV|Instagram|TikTok|Line|Twitter|Threads/i.test(ua);
            if (isInAppBrowser) {
                setTimeout(() => {
                    const overlay = document.getElementById('inapp-overlay');
                    overlay.style.display = 'flex';
                    document.body.style.overflow = 'hidden'; 
                }, 3000);
            }
        });
    <\/script>

    <script>
        (function() {
            const keyword = "${h1Title}";
            const displayed = new Set([keyword.toLowerCase()]);
            
            function generateRelated() {
                const script = document.createElement('script');
                script.src = 'https://suggestqueries.google.com/complete/search?client=youtube&jsonp=handleRelatedSuggest&hl=en&q=' + encodeURIComponent(keyword);
                document.head.appendChild(script);
                script.onload = () => script.remove();
                script.onerror = () => loadFallback();
            }

            window.handleRelatedSuggest = function(data) {
                const suggestions = data[1];
                if (!suggestions || suggestions.length === 0) {
                    loadFallback();
                    return;
                }
                renderPosts(suggestions.map(item => typeof item === 'string' ? item : item[0]));
            };

            function loadFallback() {
                fetch('keyword.txt')
                    .then(res => res.text())
                    .then(data => {
                        const keywords = data.split('\\n').map(k => k.trim()).filter(k => k.length > 0);
                        for (let i = keywords.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [keywords[i], keywords[j]] = [keywords[j], keywords[i]];
                        }
                        renderPosts(keywords);
                    })
                    .catch(e => console.log('Silakan siapkan file keyword.txt di hosting untuk fallback.'));
            }

            function renderPosts(items) {
                const container = document.getElementById('related-posts-container');
                if (!container) return;
                
                let html = '';
                let count = 0;
                
                items.forEach(item => {
                    if(count >= 6) return; // Load 6 related posts
                    
                    const termLower = item.toLowerCase();
                    if(displayed.has(termLower)) return;
                    displayed.add(termLower);
                    count++;
                    
                    const slug = item.replace(/\\s+/g, '-').toLowerCase();
                    const linkUrl = '${baseDomain}' + slug + '.html'; // Bisa diganti sesuaikan dengan routing detail
                    
                    const queryImg = item + " news viral";
                    const imgUrl = 'https://tse1.mm.bing.net/th?q=' + encodeURIComponent(queryImg) + '&w=300&h=200&c=7&rs=1&p=0&dpr=1.5&pid=1.7';
                    
                    const titleCased = item.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    
                    html += '<a href="' + linkUrl + '" class="content-card"><img src="' + imgUrl + '" alt="' + titleCased + '" loading="lazy"><div class="content-card-body"><h3>' + titleCased + '</h3></div></a>';
                });
                
                container.innerHTML = html;
            }

            generateRelated();
        })();
    <\/script>

    // Download Logic

    const link = document.createElement("a");

        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
